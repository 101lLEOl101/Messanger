name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: {node-version: '24', cache: npm }
      - run: npm ci
      - run: npm run lint

  backend-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: messanger
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: messanger_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U messanger -d messanger_test"
          --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      JWT_SECRET: test-secret
      DATABASE_URL: postgresql://messanger:devpassword@localhost:5432/messanger_test?schema=public
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '24', cache: npm }
      - run: npm ci
      - run: npm run prisma:generate
      - run: npx tsc --noEmit -p backend/tsconfig.json
      - run: npm run prisma:deploy
      - run: npm run test:backend
      - run: npm run test:e2e
      - run: npm run build:backend

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: {node-version: '24', cache: 'npm'}
      - run: npm ci
      - run: npx tsc --noEmit -p frontend/tsconfig.json
      - run: npm run test:coverage:frontend
      - run: npm run build:frontend
