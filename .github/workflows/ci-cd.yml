name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: {node-version: '24', cache: npm }
      - run: npm ci
      - run: npm run lint

  backend-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: messanger
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: messanger_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U messanger -d messanger_test"
          --health-interval 5s --health-timeout 3s --health-retries 5
    env:
      JWT_SECRET: test-secret
      DATABASE_URL: postgresql://messanger:devpassword@localhost:5432/messanger_test?schema=public
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '24', cache: npm }
      - run: npm ci
      - run: npm run prisma:generate
      - run: npx tsc --noEmit -p backend/tsconfig.json
      - run: npm run prisma:deploy
      - run: npm run test:backend
      - run: npm run test:e2e
      - run: npm run build:backend

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: {node-version: '24', cache: 'npm'}
      - run: npm ci
      - run: npx tsc --noEmit -p frontend/tsconfig.json
      - run: npm run test:coverage:frontend
      - run: npm run build:frontend
  publish:
    if: github.ref == 'refs/heads/main'
    needs: [ lint, backend-ci, frontend-ci ]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/101lleol101/messanger-backend:latest
            ghcr.io/101lleol101/messanger-backend:${{ github.sha }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/101lleol101/messanger-frontend:latest
            ghcr.io/101lleol101/messanger-frontend:${{ github.sha }}
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: docker-compose.prod.yml
          target: ~/messanger/Messanger
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/messanger/Messanger
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
            DOMAIN=$(grep '^DOMAIN=' .env | cut -d= -f2)
            for i in $(seq 1 30); do
              curl -fsS --resolve "$DOMAIN:443:127.0.0.1" "https://$DOMAIN/api/ready" >/dev/null && { echo "smoke ok"; exit 0; }
              sleep 2
            done
            echo "smoke FAILED"
            docker compose -f docker-compose.prod.yml ps
            docker compose -f docker-compose.prod.yml logs --tail=30 backend
            exit 1